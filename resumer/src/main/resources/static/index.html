<link rel="stylesheet" href="/style.css">
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ReTeX | AI Resume Refiner</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

</head>
<body>
<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="/logo.png" alt="ReTeX Logo" class="project-logo">
    </div>
    <h2>Refine your Resume</h2>
    <form hx-post="/api/resume/refine"
          hx-encoding="multipart/form-data"
          hx-target="#preview-pane"
          hx-indicator="#loading-spinner">

        <label>Job Description</label>
        <textarea name="jobDescription" placeholder="Paste requirements here..."></textarea>

        <div class="input-group">
            <label>Upload your Resume</label>
            <input type="file" name="file" accept=".tex">
        </div>

        <button type="submit" style="margin-top: 10px;">Refine my resume!</button>

        <div id="loading-spinner" class="htmx-indicator spinner-container">
            <div class="spinner"></div>
            <p>Matching... Refining... Polishing...</p>
        </div>
    </form>
</div>

<div id="preview-pane" class="full-width-output">
</div>
</body>
</html>
