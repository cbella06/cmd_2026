<link rel="stylesheet" href="/style.css">
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ReTeX | AI Resume Refiner</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

</head>
<body>
<div class="container">
    <h2>ReTeX</h2>

    <form hx-post="/api/resume/refine"
          hx-encoding="multipart/form-data"
          hx-target="#preview-pane"
          hx-indicator="#loading-spinner">

        <label>Paste Job Description:</label><br>
        <textarea name="jobDescription" placeholder="Paste the job requirements here..."></textarea><br>

        <label>Upload your Resume (.tex):</label><br>
        <input type="file" name="file" accept=".tex"><br><br>

        <button type="submit">Refine my resume!</button>

        <div id="loading-spinner" class="htmx-indicator" style="text-align: center; margin-top: 15px;">
            <div class="spinner"></div>
            <p style="font-size: 0.875rem; color: var(--primary); font-weight: 500;">
                Matching... Refining... Polishing...
            </p>
        </div>
    </form>

    <hr>

    <div id="preview-pane">
        <p style="color: gray; text-align: center; font-size: 0.9rem;">
            Your refined resume will appear here.
        </p>
    </div>
</div>
</body>
</html>
